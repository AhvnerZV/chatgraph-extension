<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
      margin: 0 0 8px;
    }

    /* ── Mode toggle cards ── */
    .mode-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .mode-option {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 11px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .mode-option:hover { border-color: #c7d2fe; background: #f5f3ff; }
    .mode-option.selected { border-color: #6366f1; background: #eef2ff; }

    .mode-option input[type="radio"] {
      margin: 2px 0 0;
      accent-color: #6366f1;
      flex-shrink: 0;
    }

    .mode-text strong {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #111;
      margin-bottom: 2px;
    }

    .mode-text span {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
    }

    hr {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 14px 0;
    }

    /* ── API key section ── */
    .api-section { transition: opacity 0.15s; }
    .api-section.dimmed { opacity: 0.55; }

    .api-note {
      font-size: 11px;
      color: #6366f1;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 6px;
      padding: 6px 9px;
      margin-bottom: 10px;
      line-height: 1.4;
      display: none;
    }

    .api-section.dimmed .api-note { display: block; }

    input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      font-size: 12.5px;
      font-family: inherit;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.12s;
    }

    input[type="password"]:focus { border-color: #6366f1; }

    button#save {
      width: 100%;
      padding: 8px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }

    button#save:hover { background: #4f46e5; }

    #status {
      margin-top: 8px;
      font-size: 11.5px;
      color: #22c55e;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>⬡ ChatGraph</h2>

  <div class="section-label">Send mode</div>

  <div class="mode-group">
    <label class="mode-option" id="opt-claudeai">
      <input type="radio" name="mode" value="claudeai">
      <div class="mode-text">
        <strong>Use Claude.ai directly</strong>
        <span>No API key needed. Drives the Claude.ai tab you have open. Branches still require an API key.</span>
      </div>
    </label>

    <label class="mode-option" id="opt-api">
      <input type="radio" name="mode" value="api">
      <div class="mode-text">
        <strong>Use my own API key</strong>
        <span>Calls Anthropic directly from the graph. API key required for all messages and branches.</span>
      </div>
    </label>
  </div>

  <hr>

  <div class="api-section" id="api-section">
    <div class="section-label">Anthropic API key</div>
    <div class="api-note">
      ℹ️ Only needed for branches when using Claude.ai mode. Main thread messages go through Claude.ai directly.
    </div>
    <input type="password" id="apiKey" placeholder="sk-ant-…" autocomplete="off">
    <button id="save">Save API Key</button>
    <div id="status"></div>
  </div>

  <script>
    const modeOptions = document.querySelectorAll('.mode-option');
    const radios      = document.querySelectorAll('input[type="radio"]');
    const apiSection  = document.getElementById('api-section');

    function applyMode(mode) {
      radios.forEach(r => r.checked = (r.value === mode));
      modeOptions.forEach(el => {
        el.classList.toggle('selected', el.querySelector('input').value === mode);
      });
      apiSection.classList.toggle('dimmed', mode === 'claudeai');
    }

    // Load saved settings
    chrome.storage.local.get(['apiKey', 'sendMode'], (data) => {
      applyMode(data.sendMode || 'claudeai');
      if (data.apiKey) document.getElementById('apiKey').value = data.apiKey;
    });

    // Mode radio change
    radios.forEach(radio => {
      radio.addEventListener('change', () => {
        applyMode(radio.value);
        chrome.storage.local.set({ sendMode: radio.value });
      });
    });

    // Clicking the card label itself toggles the radio
    modeOptions.forEach(label => {
      label.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT') return; // radio handles its own click
        const radio = label.querySelector('input');
        radio.checked = true;
        radio.dispatchEvent(new Event('change'));
      });
    });

    // Save API key
    document.getElementById('save').addEventListener('click', () => {
      const key    = document.getElementById('apiKey').value.trim();
      const status = document.getElementById('status');
      if (!key) return;
      chrome.storage.local.set({ apiKey: key }, () => {
        status.textContent = 'Saved ✓';
        setTimeout(() => status.textContent = '', 2000);
      });
    });
  </script>
</body>
</html>
